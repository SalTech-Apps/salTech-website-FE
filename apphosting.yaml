# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run

scripts:
  buildCommand: npm run build
  runCommand: npm run start

runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
# Sensitive values (e.g. VITE_FIREBASE_API_KEY) are in Secret Manager.
# Set via: firebase apphosting:secrets:set VITE_FIREBASE_API_KEY
#
# SMTP secrets (for Cloud Functions - also set via: firebase functions:secrets:set SMTP_USER)
# Firebase Admin (for sitemap/server-side Firestore) - set via: firebase apphosting:secrets:set FIREBASE_CLIENT_EMAIL
env:
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: SMTP_USER
    secret: SMTP_USER
    availability:
      - RUNTIME
  - variable: SMTP_PASS
    secret: SMTP_PASS
    availability:
      - BUILD
      - RUNTIME
  - variable: SMTP_HOST
    secret: SMTP_HOST
    availability:
      - BUILD
      - RUNTIME
  - variable: SMTP_PORT
    secret: SMTP_PORT
    availability:
      - BUILD
      - RUNTIME
  - variable: SMTP_SECURE
    secret: SMTP_SECURE
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_API_KEY
    secret: VITE_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    value: "jesfem-f812b.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_PROJECT_ID
    value: "jesfem-f812b"
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    value: "jesfem-f812b.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    value: "887981319429"
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_APP_ID
    value: "1:887981319429:web:8f80ef7c815c23d17c036c"
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_MEASUREMENT_ID
    value: "G-PNBSKESFZM"
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_DATABASE_ID
    value: "default"
